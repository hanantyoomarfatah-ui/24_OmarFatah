<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BelajarYuk! — Daftar</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito',sans-serif;min-height:100vh;
  background:linear-gradient(135deg,#0f2027 0%,#203a43 40%,#0c2461 100%);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.15;pointer-events:none;animation:floatBlob 9s ease-in-out infinite}
.blob1{width:450px;height:450px;background:#06b6d4;top:-100px;right:-80px;animation-delay:0s}
.blob2{width:380px;height:380px;background:#8b5cf6;bottom:-80px;left:-60px;animation-delay:4s}
.blob3{width:280px;height:280px;background:#22c55e;top:50%;right:20%;animation-delay:7s}
@keyframes floatBlob{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,15px)}}
.stars{position:fixed;inset:0;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.06}to{opacity:.75}}

.card-wrap{
  display:flex;
  background:rgba(255,255,255,.055);backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.12);border-radius:28px;
  box-shadow:0 30px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.12);
  overflow:hidden;width:100%;max-width:860px;
  animation:cardEnter .65s cubic-bezier(.34,1.56,.64,1);
  position:relative;z-index:2;margin:1rem;
}
@keyframes cardEnter{from{opacity:0;transform:scale(.88) translateY(32px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* LEFT */
.panel-left{
  flex:1;
  background:linear-gradient(160deg,rgba(6,182,212,.25) 0%,rgba(34,197,94,.17) 50%,rgba(99,102,241,.2) 100%);
  padding:3rem 2.5rem;display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden;border-right:1px solid rgba(255,255,255,.08);
}
.panel-left::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;border:45px solid rgba(255,255,255,.05);bottom:-60px;right:-60px}
.panel-left::after{content:'';position:absolute;width:180px;height:180px;border-radius:50%;border:30px solid rgba(255,255,255,.06);top:20px;left:-30px}
.brand-icon{font-size:3rem;display:block;margin-bottom:.8rem;animation:bounceIcon 2.8s ease-in-out infinite}
@keyframes bounceIcon{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(-6deg)}}
.brand{font-family:'Fredoka One',cursive;font-size:2.4rem;color:#fff;line-height:1.05;margin-bottom:.45rem}
.brand-tagline{color:rgba(255,255,255,.62);font-size:.9rem;line-height:1.75;margin-bottom:2.2rem;max-width:255px}
.step-list{list-style:none;display:flex;flex-direction:column;gap:1.1rem}
.step-list li{display:flex;align-items:center;gap:.9rem;color:rgba(255,255,255,.82);font-size:.88rem;font-weight:700}
.step-num{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#06b6d4,#22c55e);
  color:#fff;font-size:.78rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 3px 12px rgba(6,182,212,.45);
}

/* RIGHT */
.panel-right{
  width:380px;flex-shrink:0;padding:2.8rem 2.5rem;
  display:flex;flex-direction:column;justify-content:center;
  background:rgba(255,255,255,.02);
}
.form-title{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#fff;margin-bottom:.28rem}
.form-sub{color:rgba(255,255,255,.43);font-size:.82rem;margin-bottom:1.8rem}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:.7rem;font-weight:800;color:rgba(255,255,255,.43);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.42rem}
.form-group input{
  width:100%;padding:.82rem 1.1rem;border-radius:14px;
  background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);
  color:#fff;font-family:'Nunito',sans-serif;font-size:.93rem;outline:none;transition:all .25s;
}
.form-group input::placeholder{color:rgba(255,255,255,.27)}
.form-group input:focus{background:rgba(255,255,255,.13);border-color:rgba(6,182,212,.65);box-shadow:0 0 0 3px rgba(6,182,212,.18)}
.submit-btn{
  width:100%;padding:.92rem;margin-top:.3rem;
  background:linear-gradient(135deg,#06b6d4,#22c55e);
  color:#fff;border:none;border-radius:14px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 6px 22px rgba(6,182,212,.38);position:relative;overflow:hidden;
}
.submit-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.13),transparent);border-radius:inherit}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(6,182,212,.52)}
.submit-btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
.switch-link{text-align:center;margin-top:1.5rem;color:rgba(255,255,255,.4);font-size:.82rem}
.switch-link a{color:#67e8f9;font-weight:800;text-decoration:none;transition:color .2s}
.switch-link a:hover{color:#a5f3fc}
.msg-box{padding:.65rem 1rem;border-radius:10px;font-size:.82rem;font-weight:700;margin-bottom:1rem;display:none}
.msg-box.error{background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.32);color:#fca5a5;display:block}
.msg-box.success{background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.32);color:#86efac;display:block}

@media(max-width:720px){
  .panel-left{display:none}
  .panel-right{width:100%;padding:2.3rem 1.7rem}
  .card-wrap{max-width:420px}
}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="stars" id="stars"></div>

<div class="card-wrap">
  <div class="panel-left">
    <span class="brand-icon">✨</span>
    <div class="brand">Bergabung<br/>BelajarYuk!</div>
    <p class="brand-tagline">Buat akun gratis dan mulai perjalanan belajarmu sekarang juga.</p>
    <ul class="step-list">
      <li><span class="step-num">1</span> Isi nama dan data dirimu</li>
      <li><span class="step-num">2</span> Buat username &amp; password</li>
      <li><span class="step-num">3</span> Akses semua materi gratis!</li>
    </ul>
  </div>

  <div class="panel-right">
    <div class="form-title">Buat Akun Baru ✨</div>
    <div class="form-sub">Daftar gratis, belajar tanpa batas!</div>
    <div class="msg-box" id="regMsg"></div>
    <div class="form-group">
      <label>Nama Lengkap</label>
      <input type="text" id="r-name" placeholder="Nama kamu..." autocomplete="name"/>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="r-user" placeholder="Username unik..." autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="r-email" placeholder="contoh@email.com..." autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="r-pass" placeholder="Buat password kuat..."
        onkeydown="if(event.key==='Enter')doRegister()"/>
    </div>
    <button class="submit-btn" id="regBtn" onclick="doRegister()">Daftar Sekarang 🎉</button>
    <div class="switch-link">Sudah punya akun? <a href="login.html">Masuk di sini →</a></div>
  </div>
</div>

<script>
const API = 'https://herisusanta.my.id/javalogin/api/';

const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  const size = Math.random() * 2.5 + 0.5;
  s.className = 'star';
  s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s`;
  starsEl.appendChild(s);
}

function showMsg(msg, type) {
  const el = document.getElementById('regMsg');
  el.textContent = msg;
  el.className = 'msg-box ' + type;
}

async function doRegister() {
  const name  = document.getElementById('r-name').value.trim();
  const user  = document.getElementById('r-user').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value.trim();
  if (!name || !user || !email || !pass) { showMsg('Semua kolom wajib diisi!', 'error'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showMsg('Format email tidak valid!', 'error'); return; }
  if (pass.length < 3) { showMsg('Password minimal 3 karakter!', 'error'); return; }
  const btn = document.getElementById('regBtn');
  btn.textContent = 'Mendaftar...'; btn.disabled = true;
  try {
    const res = await fetch(API + 'register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, email: email, password: pass })
    });
    const data = await res.json();
    if (data.status === 'success' || data.success || res.ok) {
      showMsg('Daftar berhasil! Menuju halaman login... 🎉', 'success');
      setTimeout(() => window.location.href = 'login.html', 1800); return;
    }
    showMsg(data.message || 'Gagal mendaftar.', 'error');
  } catch (e) {
    const saved = JSON.parse(localStorage.getItem('belajarUsers') || '{}');
    if (saved[user]) { showMsg('Username sudah digunakan!', 'error'); btn.textContent = 'Daftar Sekarang 🎉'; btn.disabled = false; return; }
    saved[user] = { pass, name, email };
    localStorage.setItem('belajarUsers', JSON.stringify(saved));
    showMsg('Daftar berhasil! Menuju halaman login... 🎉', 'success');
    setTimeout(() => window.location.href = 'login.html', 1800);
  } finally {
    btn.textContent = 'Daftar Sekarang 🎉'; btn.disabled = false;
  }
}
</script>
</body>
</html>
